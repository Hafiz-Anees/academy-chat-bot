# Deploy to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - run
    - deploy
    - academy-bot
    - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/academy-bot-repo/academy-bot:$COMMIT_SHA
    - --region=asia-south1
    - --platform=managed
    - --allow-unauthenticated
    - >-
      --set-secrets=QDRANT_URL=QDRANT_URL:latest,QDRANT_API_KEY=QDRANT_API_KEY:latest,GROQ_API_KEY=GROQ_API_KEY:latest,GROQ_MODEL=GROQ_MODEL:latest,EMBEDDING_MODEL=EMBEDDING_MODEL:latest,QDRANT_COLLECTION=QDRANT_COLLECTION:latest,ELEVENLABS_API_KEY=ELEVENLABS_API_KEY:latest,WHATSAPP_TOKEN=WHATSAPP_TOKEN:latest,WHATSAPP_PHONE_NUMBER_ID=WHATSAPP_PHONE_NUMBER_ID:latest,WHATSAPP_VERIFY_TOKEN=WHATSAPP_VERIFY_TOKEN:latest,DEEPGRAM_API_KEY=DEEPGRAM_API_KEY:latest



options:
  logging: CLOUD_LOGGING_ONLY
  
steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/academy-bot-repo/academy-bot:$COMMIT_SHA'
      - '.'

  # Push the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/academy-bot-repo/academy-bot:$COMMIT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - academy-bot
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/academy-bot-repo/academy-bot:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/academy-bot-repo/academy-bot:$COMMIT_SHA'